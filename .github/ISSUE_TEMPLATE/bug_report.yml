name: Bug report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "e.g. 0.0.6"
    validations:
      required: true

  - type: input
    id: payload-version
    attributes:
      label: Payload version
      placeholder: "e.g. 3.80.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage strategy
      options:
        - Local filesystem
        - S3 via onCropGenerated
        - S3 with disableLocalStorage
        - Other cloud storage
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste the relevant `cropImagePlugin(...)` and `cropImageField(...)` config, and the steps to reproduce.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
