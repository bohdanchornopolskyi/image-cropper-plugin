name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the use case first — we want to understand the problem before jumping to a solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you run into a limitation today.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Config snippets, API sketches, and examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Any workarounds you tried, or other approaches that could solve the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or anything else that helps explain the request.
